services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ehson_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ehson_password}
      POSTGRES_DB: ${POSTGRES_DB:-ehson_db}
    ports:
      - "5433:5432"
    volumes:
      - ehson_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ehson_postgres_data:
